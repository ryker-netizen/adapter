<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_VOID</title>
    <style>
        /* Основной шрифт консоли */
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');

        :root {
            --bg: #030303;
            --low-red: #4d0000;
            --main-red: #8b0000;
            --terminal-green: #1aff1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--terminal-green);
            font-family: 'Space Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Сканирующие линии (CRT) — сделали тоньше и незаметнее */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        #terminal {
            padding: 40px;
            z-index: 1;
            flex-grow: 1;
        }

        .line { margin-bottom: 5px; min-height: 1.2em; }

        #cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--terminal-green);
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ФИНАЛЬНЫЙ ЭКРАН — АНАЛОГОВЫЙ ХОРРОР */
        #reveal-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .final-text {
            font-family: serif; /* Грязный системный шрифт */
            color: #d1d1d1;
            text-transform: lowercase;
            letter-spacing: 12px;
            font-size: 1.2rem;
            opacity: 0;
            animation: emerge 5s ease forwards;
        }

        .channel-link {
            margin-top: 30px;
            font-family: serif;
            color: var(--main-red);
            font-size: 2.5rem;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 4px;
            opacity: 0;
            filter: blur(10px);
            animation: emerge-red 4s ease forwards 3s; /* Задержка появления */
        }

        @keyframes emerge {
            0% { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            100% { opacity: 0.6; filter: blur(0); transform: translateY(0); }
        }

        @keyframes emerge-red {
            0% { opacity: 0; filter: blur(20px); }
            100% { opacity: 1; filter: blur(0); }
        }

        /* Эффект "плавания" текста */
        .drift {
            animation: drift-anim 8s ease-in-out infinite;
        }

        @keyframes drift-anim {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2px, -3px); }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div id="terminal">
        <div id="output"></div>
        <div class="line">
            <span id="input-line"></span><span id="cursor"></span>
        </div>
    </div>

    <div id="reveal-container">
        <p class="final-text drift">try going to the old channel</p>
        <a href="https://t.me/vzaidkost" class="channel-link">@vzaidkost</a>
    </div>

    <script>
        const output = document.getElementById('output');
        const inputLine = document.getElementById('input-line');
        const reveal = document.getElementById('reveal-container');
        let buffer = "";

        const log = (text, delay = 0) => {
            return new Promise(res => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerHTML = `> ${text}`;
                    output.appendChild(div);
                    res();
                }, delay);
            });
        };

        async function init() {
            await log("KERNEL_READY", 500);
            await log("LOADING_FRAGMENTS...", 300);
            await log("ERROR: 0x000F12 - MEMORY_LEAK", 800);
            await log("SYSTEM_OVERRIDE_REQUIRED", 400);
            await log("TYPE 'ignite' TO CONTINUE", 200);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Enter") {
                if (buffer === "ignite") {
                    trigger();
                } else {
                    log(`UNKNOWN_COMMAND: ${buffer}`, 0);
                    buffer = "";
                    inputLine.innerText = "";
                }
            } else if (e.key === "Backspace") {
                buffer = buffer.slice(0, -1);
            } else if (e.key.length === 1) {
                buffer += e.key.toLowerCase();
            }
            inputLine.innerText = buffer;
        });

        function trigger() {
            document.body.style.background = "#fff"; // Вспышка
            setTimeout(() => {
                document.getElementById('terminal').style.display = 'none';
                reveal.style.display = 'flex';
                playLowHum();
            }, 50);
        }

        function playLowHum() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(40, ctx.currentTime); // Низкий гул
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
        }

        init();
    </script>
</body>
</html>
