<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Y S T E M _ F A I L U R E</title>
    <style>
        /* Шрифт терминала — твой оригинал */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg: #050505;
            --text-main: #33ff33;
            --text-dim: #1a661a;
            --glitch-red: #ff003c;
            --glitch-blue: #00e5ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'VT323', monospace;
            overflow: hidden;
            font-size: 1.2rem;
        }

        /* CRT Effect Overlay — твой оригинал */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.5) 50%), 
            linear-gradient(90deg, rgba(255, 0, 0, 0.12), rgba(0, 255, 0, 0.05), rgba(0, 0, 255, 0.12));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #typing-indicator {
            display: inline-block;
            font-weight: bold;
            animation: cursor-blink 1s step-end infinite;
        }

        .hidden-text {
            color: var(--bg);
            user-select: all;
            margin-top: 2rem;
            cursor: text;
            transition: 0.3s;
        }
        .hidden-text::selection { background-color: #333; color: #555; }
        .hidden-text:hover { color: #0f0; text-shadow: 0 0 5px #0f0; }

        /* ФИНАЛЬНЫЙ ЭКРАН (Тот самый "суперский") */
        #reveal-container {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: inset 0 0 150px rgba(50, 0, 0, 0.5);
        }

        .final-message {
            font-family: serif; /* Смена шрифта только для финала */
            color: #444;
            font-size: 1.2rem;
            letter-spacing: 12px;
            text-transform: lowercase;
            opacity: 0;
            animation: emerge 5s ease forwards;
        }

        .channel-name {
            margin-top: 20px;
            font-family: serif;
            font-size: 3.5rem;
            font-weight: bold;
            color: #8b0000;
            text-decoration: none;
            letter-spacing: 6px;
            opacity: 0;
            filter: blur(15px);
            animation: emerge-red 4s ease forwards 2.5s;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        .easter-egg {
            position: absolute;
            bottom: 10px; right: 15px;
            font-family: 'VT323', monospace;
            font-size: 14px;
            color: #080808;
            transition: 0.5s;
            user-select: none;
        }
        .easter-egg:hover { color: var(--text-main); text-shadow: 0 0 10px var(--text-main); }

        /* Анимации финала */
        @keyframes emerge {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 0.6; filter: blur(0); }
        }
        @keyframes emerge-red {
            0% { opacity: 0; filter: blur(20px); }
            100% { opacity: 1; filter: blur(0); }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(2px, -3px); }
        }
        .drift { animation: drift 10s ease-in-out infinite; }

        /* Твои старые анимации глитчей */
        @keyframes image-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(0px, -1px) rotate(-0.5deg); }
        }
    </style>
</head>
<body class="crt">

    <div id="terminal">
        <div id="boot-sequence"></div>
        <div id="interactive-layer" style="display: none;">
            <p>> DIRECTIVE PENDING...</p>
            <p>> MEMORY FRAGMENT LOST. INITIATE MANUAL OVERRIDE.</p>
            <p>> WAITING FOR INPUT: <span id="input-buffer"></span><span id="typing-indicator">_</span></p>
            <p class="hidden-text">...it's cold in here. type "ignite" to start the fire...</p>
        </div>
    </div>

    <div id="reveal-container">
        <div class="final-message drift">try going to the old channel</div>
        <a href="https://t.me/vzaidkost" class="channel-name">@vzaidkost</a>
        <div class="easter-egg">19.10.2025</div>
    </div>

    <script>
        const bootLines = [
            "INITIATING CORE PROTOCOLS...",
            "LOADING VIRTUAL ENVIRONMENT... [OK]",
            "DECRYPTING ARCHIVES... [FAILED]",
            "WARNING: SEVERE DATA CORRUPTION DETECTED.",
            "ATTEMPTING TO ESTABLISH SECURE CONNECTION...",
            "CONNECTION REFUSED BY HOST.",
            "ISOLATING SECTOR: V-Z-A-I-D...",
            "..."
        ];

        const bootContainer = document.getElementById('boot-sequence');
        const interactiveLayer = document.getElementById('interactive-layer');
        const revealContainer = document.getElementById('reveal-container');
        const inputBufferEl = document.getElementById('input-buffer');

        async function typeLines() {
            for (let line of bootLines) {
                const p = document.createElement('p');
                bootContainer.appendChild(p);
                for (let i = 0; i < line.length; i++) {
                    p.innerHTML += line.charAt(i);
                    await new Promise(r => setTimeout(r, 20 + Math.random() * 30));
                }
                await new Promise(r => setTimeout(r, 300));
            }
            setTimeout(() => {
                bootContainer.innerHTML = ''; 
                interactiveLayer.style.display = 'block'; 
            }, 1000);
        }

        window.onload = typeLines;

        let keyBuffer = "";
        const secretCode = "ignite";

        document.addEventListener('keydown', (e) => {
            if(interactiveLayer.style.display === 'none') return; 
            
            if (e.key === "Backspace") {
                keyBuffer = keyBuffer.slice(0, -1);
            } 
            else if (e.key.length === 1 && e.key.match(/[a-z0-9]/i)) {
                keyBuffer += e.key.toLowerCase();
            }

            inputBufferEl.innerText = keyBuffer.slice(-10);

            if (keyBuffer.includes(secretCode)) {
                triggerAnomaly();
            }
            
            if (Math.random() > 0.9) {
                document.body.style.transform = "scale(1.01) translate(" + (Math.random()*2-1) + "px, " + (Math.random()*2-1) + "px)";
                document.body.style.filter = "hue-rotate(90deg)";
                setTimeout(() => {
                    document.body.style.transform = "none";
                    document.body.style.filter = "none";
                }, 50);
            }
        });

        function triggerAnomaly() {
            document.body.style.animation = "image-shake 0.1s infinite";
            document.body.style.filter = "invert(100%) contrast(200%)";
            document.body.style.background = "red";
            
            playGlitchSound();

            setTimeout(() => {
                document.body.style.animation = "none";
                document.body.style.filter = "none";
                document.getElementById('terminal').style.display = 'none';
                revealContainer.style.display = 'flex';
            }, 800);
        }

        function playGlitchSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const bufferSize = ctx.sampleRate * 1.5; 
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            const gain = ctx.createGain();
            gain.gain.value = 0.2;
            noise.connect(gain);
            gain.connect(ctx.destination);
            noise.start(0);
        }

        // Твои рандомные глитчи в терминале
        setInterval(() => {
            if (interactiveLayer.style.display === 'block') {
                const glitchChance = Math.random();
                if (glitchChance > 0.85) {
                    document.body.style.filter = "saturate(500%) hue-rotate(45deg)";
                    setTimeout(() => { document.body.style.filter = "none"; }, 50);
                }
                if (glitchChance > 0.95) {
                    const fake = document.createElement('p');
                    fake.innerText = "> the old channel is waiting";
                    fake.style.color = "#ff003c";
                    fake.style.opacity = "0.5";
                    bootContainer.appendChild(fake);
                    setTimeout(() => fake.remove(), 600);
                }
            }
        }, 2000);
    </script>
</body>
</html>
